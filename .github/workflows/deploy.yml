name: Deploy na VPS

on:
  workflow_run:
    workflows: ["Build e Push Docker"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            cd /root/agrinet
            git pull origin main

            cat > .env <<'ENVEOF'
            PORT=5000
            NODE_ENV=production
            DB_HOST=mariadb
            DB_PORT=3306
            DB_USER=agrinet
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=agrinet
            REDIS_HOST=redis
            REDIS_PORT=6379
            API_KEY=${{ secrets.API_KEY }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            STRIPE_KEY=${{ secrets.STRIPE_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
            R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
            R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            R2_BUCKET=${{ secrets.R2_BUCKET }}
            R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}
            FEDERATION_SECRET=${{ secrets.FEDERATION_SECRET }}
            NODE_URL=${{ secrets.NODE_URL }}
            NODE_ID=backend-node-01
            NODE_TYPE=backend
            ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            OPENAI_MODEL=${{ secrets.OPENAI_MODEL }}
            TWILIO_SID=${{ secrets.TWILIO_SID }}
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }}
            TWILIO_STATUS_CALLBACK_URL=${{ secrets.TWILIO_STATUS_CALLBACK_URL }}
            WIX_API_KEY=${{ secrets.WIX_API_KEY }}
            ENVEOF

            docker compose -f infra/docker/docker-compose.yml down --remove-orphans || true
            docker compose -f infra/docker/docker-compose.yml pull
            docker compose -f infra/docker/docker-compose.yml up -d

            docker image prune -f
