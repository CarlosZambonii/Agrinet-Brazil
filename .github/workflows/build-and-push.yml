name: Build e Push Docker

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "infra/docker/**"
      - ".github/workflows/**"

jobs:
  build-and-push:
    name: Build e Push imagens
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determinar tags da imagem
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="latest"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push agrinet-api
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            caza6367/agrinet-api:latest
            caza6367/agrinet-api:${{ steps.meta.outputs.version }}
            caza6367/agrinet-api:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e Push agrinet-federation-sync
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: true
          tags: |
            caza6367/agrinet-federation-sync:latest
            caza6367/agrinet-federation-sync:${{ steps.meta.outputs.version }}
            caza6367/agrinet-federation-sync:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e Push agrinet-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:5000' }}
            NEXT_PUBLIC_API_KEY=${{ secrets.NEXT_PUBLIC_API_KEY }}
          tags: |
            caza6367/agrinet-frontend:latest
            caza6367/agrinet-frontend:${{ steps.meta.outputs.version }}
            caza6367/agrinet-frontend:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
