services:

  mariadb:
    image: mariadb:11
    container_name: agrinet_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agrinet
      MYSQL_USER: agrinet
      MYSQL_PASSWORD: agrinet
    volumes:
      - mariadb_data:/var/lib/mysql
      - ../../schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7
    container_name: agrinet_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    image: caza6367/agrinet-api:latest
    container_name: agrinet_api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"
    env_file:
      - ../../.env
    environment:
      DB_HOST: mariadb
      DB_USER: agrinet
      DB_PASSWORD: agrinet
      DB_NAME: agrinet
      REDIS_HOST: redis
      PORT: 5000

  frontend:
    image: caza6367/agrinet-frontend:latest
    container_name: agrinet_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:5000/api
      NEXT_PUBLIC_API_KEY: ${API_KEY}
      NODE_ENV: production

  federation-sync:
    image: caza6367/agrinet-federation-sync:latest
    container_name: agrinet_federation_sync
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DB_HOST: mariadb
      DB_USER: agrinet
      DB_PASSWORD: agrinet
      DB_NAME: agrinet
      REDIS_HOST: redis

  job-worker:
    image: caza6367/agrinet-api:latest
    container_name: agrinet_job_worker
    restart: unless-stopped
    command: ["node", "workers/jobWorker.js"]
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DB_HOST: mariadb
      DB_USER: agrinet
      DB_PASSWORD: agrinet
      DB_NAME: agrinet
      REDIS_HOST: redis

  nginx:
    image: nginx:alpine
    container_name: agrinet_nginx
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot
    container_name: agrinet_certbot
    volumes:
      - /var/www/certbot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

  backup:
    image: mariadb:11
    container_name: agrinet_backup
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      MYSQL_HOST: mariadb
      MYSQL_USER: agrinet
      MYSQL_PASSWORD: agrinet
      MYSQL_DATABASE: agrinet
    volumes:
      - ../../infra/backups:/backups
      - ../../infra/backups/backup.sh:/backup.sh
    entrypoint: ["sh", "-c", "while true; do /backup.sh; sleep 86400; done"]

  prometheus:
    image: prom/prometheus
    container_name: agrinet_prometheus
    restart: unless-stopped
    profiles: [monitoring]
    volumes:
      - ../../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ../../monitoring/alerts.yml:/etc/prometheus/alerts.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: agrinet_grafana
    restart: unless-stopped
    profiles: [monitoring]
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ../../monitoring/grafana/dashboards:/var/lib/grafana/dashboards

volumes:
  mariadb_data:
  redis_data:
  grafana_data:
